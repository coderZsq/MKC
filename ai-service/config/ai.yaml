celery:
  task_acks_late: true
  task_reject_on_worker_lost: true
  task_track_started: true

asr:
  model_dir: /Users/zhushuangquan/Downloads/MKC/ai-service/models/whisper
  default_model: small
  fallback_model: tiny
  device: auto
  compute_type: int8
  beam_size: 5
  best_of: 5
  vad_filter: true
  vad_parameters:
    min_silence_duration_ms: 500
    threshold: 0.5
  chunk_length: 30
  language: zh
  sample_rate: 16000
  progress_interval: 5.0

srt:
  min_duration: 1.0
  max_duration: 6.0
  max_chars: 80
  output_format: srt
  presigned_expiry: 3600

pdf:
  extractor: pymupdf
  ocr_fallback: true
  ocr_threshold: 50
  chunk_size: 10
  progress_interval: 5.0
  max_pdf_size: 104857600  # 100 MiB
  max_pages: 5000

ocr:
  enabled: true
  engine: paddleocr
  lang: ch
  dpi: 300
  max_pages_in_memory: 5

# result_storage will be fully configured in S2-6; PDF parse already uploads JSON to MinIO.

text_cleaning:
  enabled: true
  mode: rule          # rule / llm / hybrid
  llm_model: glm-4-flash
  temperature: 0.1
  max_tokens: 2048
  batch_size: 10
  fallback_on_error: true
  filler_words:
    - "嗯"
    - "啊"
    - "哦"
    - "呃"
    - "那个"
    - "就是"

chunking:
  strategy: paragraph            # paragraph / fixed_token / semantic
  chunk_size: 512                # 最大 token 数
  chunk_overlap: 50              # 重叠 token 数
  separators:
    - "\n## "
    - "\n# "
    - "\n\n"
    - "\n"
    - "。"
    - "，"
    - " "
    - ""
  preserve_metadata: true

embedding:
  provider: "${EMBEDDING_PROVIDER:-zhipuai}"  # zhipuai / openai / ollama / opensource / mock
  model: "${EMBEDDING_MODEL:-embedding-3}"
  api_key: "${EMBEDDING_API_KEY:-}"
  base_url: "${EMBEDDING_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}"
  batch_size: "${EMBEDDING_BATCH_SIZE:-64}"
  max_retries: 3
  timeout: "${EMBEDDING_TIMEOUT:-30}"
  dimensions: "${EMBEDDING_DIMENSIONS:-2048}"
  normalize: true
  max_text_chars: "${EMBEDDING_MAX_TEXT_CHARS:-8000}"

minio:
  endpoint: localhost:9000
  # MinIO credentials are read from environment variables:
  #   MINIO_ACCESS_KEY, MINIO_SECRET_KEY
  bucket: mkc-resources
  use_ssl: false
  region: us-east-1

vector_store:
  provider: "${VECTOR_STORE_PROVIDER:-milvus}"  # milvus / chroma
  collection_name: "${VECTOR_STORE_COLLECTION_NAME:-mkc_vectors}"
  uri: "${VECTOR_STORE_URI:-./milvus.db}"
  db_name: "${VECTOR_STORE_DB_NAME:-default}"
  user: "${VECTOR_STORE_USER:-}"
  password: "${VECTOR_STORE_PASSWORD:-}"
  token: "${VECTOR_STORE_TOKEN:-}"
  fallback_provider: "${VECTOR_STORE_FALLBACK_PROVIDER:-chroma}"
  chroma_path: "${VECTOR_STORE_CHROMA_PATH:-./chroma}"
  dimensions: "${VECTOR_STORE_DIMENSIONS:-2048}"
  metric_type: "${VECTOR_STORE_METRIC_TYPE:-COSINE}"
  max_retries: "${VECTOR_STORE_MAX_RETRIES:-3}"
  retry_min_wait: "${VECTOR_STORE_RETRY_MIN_WAIT:-1}"
  retry_max_wait: "${VECTOR_STORE_RETRY_MAX_WAIT:-10}"
  connect_timeout: "${VECTOR_STORE_CONNECT_TIMEOUT:-10}"

retrieval:
  default_top_k: 5
  score_threshold: 0.7
  max_context_tokens: 4096
  prompt_template: "prompts/rag.txt"

agent:
  enabled: true
  recursion_limit: 12
  max_iterations: 3
  overall_timeout: 120
  default_intent: qa
  enable_dynamic_intent: false
  dynamic_intent_model: glm-4-flash
  enable_web_search: false
  compare_concurrency: 3
  fallback_message: "抱歉，暂无法生成答案，请稍后重试"
  checkpointer:
    backend: memory
    sqlite_path: "data/agent_checkpoints.db"
  sse:
    emit_node_events: true

extraction:
  enabled: true
  llm:
    temperature: 0.1
    max_tokens: 1024
  tags:
    min_count: 5
    max_count: 10
    normalize_lowercase: false
    synonym_merge: true
  batch:
    max_chars: 4000
  fallback:
    enabled: true

llm:
  provider: "${LLM_PROVIDER:-zhipuai}"          # zhipuai / kimi / ollama / mock
  model: "${LLM_MODEL:-glm-4-flash}"
  api_key: "${LLM_API_KEY:-}"
  base_url: "${LLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}"
  fallback_model: "${LLM_FALLBACK_MODEL:-}"
  temperature: "${LLM_TEMPERATURE:-0.7}"
  max_tokens: "${LLM_MAX_TOKENS:-2048}"
  timeout: "${LLM_TIMEOUT:-60}"
  max_retries: "${LLM_MAX_RETRIES:-3}"
  mock_response: "${LLM_MOCK_RESPONSE:-这是来自 mock provider 的固定回答。}"
  mock_stream_chunks: "${LLM_MOCK_STREAM_CHUNKS:-mock, ,answer}"

gateway:
  base_url: http://localhost:8080
  # Internal API key is read from the INTERNAL_API_KEY environment variable.
  progress_path: /api/v1/internal/tasks/{task_id}/progress
  status_path: /api/v1/internal/tasks/{task_id}/status
