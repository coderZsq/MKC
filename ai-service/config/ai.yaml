celery:
  task_acks_late: true
  task_reject_on_worker_lost: true
  task_track_started: true

asr:
  model_dir: /Users/zhushuangquan/Downloads/MKC/ai-service/models/whisper
  default_model: small
  fallback_model: tiny
  device: auto
  compute_type: int8
  beam_size: 5
  best_of: 5
  vad_filter: true
  vad_parameters:
    min_silence_duration_ms: 500
    threshold: 0.5
  chunk_length: 30
  language: zh
  sample_rate: 16000
  progress_interval: 5.0

srt:
  min_duration: 1.0
  max_duration: 6.0
  max_chars: 80
  output_format: srt
  presigned_expiry: 3600

pdf:
  extractor: pymupdf
  ocr_fallback: true
  ocr_threshold: 50
  chunk_size: 10
  progress_interval: 5.0
  max_pdf_size: 104857600  # 100 MiB
  max_pages: 5000

ocr:
  enabled: true
  engine: paddleocr
  lang: ch
  dpi: 300
  max_pages_in_memory: 5

# result_storage will be fully configured in S2-6; PDF parse already uploads JSON to MinIO.

text_cleaning:
  enabled: true
  mode: rule          # rule / llm / hybrid
  llm_model: glm-4-flash
  temperature: 0.1
  max_tokens: 2048
  batch_size: 10
  fallback_on_error: true
  filler_words:
    - "嗯"
    - "啊"
    - "哦"
    - "呃"
    - "那个"
    - "就是"

chunking:
  strategy: paragraph            # paragraph / fixed_token / semantic
  chunk_size: 512                # 最大 token 数
  chunk_overlap: 50              # 重叠 token 数
  separators:
    - "\n## "
    - "\n# "
    - "\n\n"
    - "\n"
    - "。"
    - "，"
    - " "
    - ""
  preserve_metadata: true

minio:
  endpoint: localhost:9000
  # MinIO credentials are read from environment variables:
  #   MINIO_ACCESS_KEY, MINIO_SECRET_KEY
  bucket: mkc-resources
  use_ssl: false
  region: us-east-1

gateway:
  base_url: http://localhost:8080
  # Internal API key is read from the INTERNAL_API_KEY environment variable.
  progress_path: /api/v1/internal/tasks/{task_id}/progress
  status_path: /api/v1/internal/tasks/{task_id}/status
