name: mkc_client
description: MKC Flutter client — Multimedia AI Knowledge Companion.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.1.4

  # Networking
  dio: ^5.4.3

  # Local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Model generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0

  # UI
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0

  # File picker / upload
  file_picker: ^8.0.5

  # Internationalization
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
