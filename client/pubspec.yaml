name: mkc_client
description: MKC Flutter client — Multimedia AI Knowledge Companion.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  dio: ^5.4.3
  file_picker: ^8.0.5
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.0
  flutter_riverpod: ^2.5.1
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.1
  go_router: ^14.1.4
  http_parser: ^4.0.2
  intl: '>=0.19.0 <0.21.0'
  json_annotation: ^4.9.0
  logger: ^2.4.0
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  web: ^0.5.1

dev_dependencies:
  build_runner: ^2.4.11
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.2
  integration_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
