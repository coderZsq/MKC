apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-buckets
  namespace: mkc-dev
  labels:
    app.kubernetes.io/part-of: mkc
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: mkc
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: docker.m.daocloud.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://minio:9000/minio/health/ready; do
                echo "Waiting for MinIO..."
                sleep 2
              done
      containers:
        - name: mc
          image: docker.m.daocloud.io/minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb -p local/a-bucket
              mc mb -p local/mkc-uploads
              mc mb -p local/mkc-outputs
              mc version enable local/mkc-uploads
              mc version enable local/mkc-outputs
              echo "Buckets created."
