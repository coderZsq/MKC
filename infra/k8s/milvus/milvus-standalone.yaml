# Milvus 2.4.x standalone
# Uses existing cluster MinIO (service: minio:9000, default bucket: a-bucket)
# and dedicated milvus-etcd deployed in the same namespace.
# Configuration is supplied via environment variables to avoid overriding the
# default milvus.yaml (which contains required per-component ports).
apiVersion: v1
kind: Service
metadata:
  name: milvus
  namespace: mkc-dev
  labels:
    app: milvus
    app.kubernetes.io/part-of: mkc
spec:
  type: ClusterIP
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: http
      port: 9091
      targetPort: 9091
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  namespace: mkc-dev
  labels:
    app: milvus
    app.kubernetes.io/part-of: mkc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
        app.kubernetes.io/part-of: mkc
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: docker.m.daocloud.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z milvus-etcd 2379; do
                echo "Waiting for etcd..."
                sleep 2
              done
              until wget -qO- http://minio:9000/minio/health/ready; do
                echo "Waiting for MinIO..."
                sleep 2
              done
      containers:
        - name: milvus
          image: docker.m.daocloud.io/milvusdb/milvus:v2.4.1
          imagePullPolicy: IfNotPresent
          args:
            - milvus
            - run
            - standalone
          env:
            - name: ETCD_ENDPOINTS
              value: "milvus-etcd:2379"
            - name: MINIO_ADDRESS
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            - name: MINIO_USE_SSL
              value: "false"
          ports:
            - name: grpc
              containerPort: 19530
            - name: http
              containerPort: 9091
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
