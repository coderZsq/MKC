apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: mkc-dev
  labels:
    app.kubernetes.io/part-of: mkc
data:
  my.cnf: |
    [mysqld]
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    default-time-zone='+08:00'
    max_connections=200
    innodb_buffer_pool_size=256M
    [client]
    default-character-set=utf8mb4
