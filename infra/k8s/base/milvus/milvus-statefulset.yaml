apiVersion: v1
kind: Service
metadata:
  name: milvus
  labels:
    app: milvus
spec:
  type: ClusterIP
  selector:
    app: milvus
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: http
      port: 9091
      targetPort: 9091
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: milvus
  labels:
    app: milvus
spec:
  serviceName: milvus
  replicas: 1
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z milvus-etcd 2379; do
                echo "Waiting for etcd..."
                sleep 2
              done
              until wget -qO- http://minio:9000/minio/health/ready; do
                echo "Waiting for MinIO..."
                sleep 2
              done
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.4.1
          imagePullPolicy: IfNotPresent
          args: ["milvus", "run", "standalone"]
          env:
            - name: ETCD_ENDPOINTS
              value: "milvus-etcd:2379"
            - name: MINIO_ADDRESS
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_USE_SSL
              value: "false"
          ports:
            - name: grpc
              containerPort: 19530
            - name: http
              containerPort: 9091
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 30Gi
