apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/coderzsq/mkc-gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: APP_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MYSQL_PASSWORD
            - name: APP_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: REDIS_PASSWORD
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: JWT_SECRET
            - name: APP_AI_SERVICE_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: INTERNAL_API_KEY
            - name: APP_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: APP_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_USER
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
