apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  APP_APP_ENV: "prod"
  APP_SERVER_PORT: "8080"
  APP_SERVER_MODE: "release"
  APP_LOG_LEVEL: "info"
  APP_LOG_FORMAT: "json"
  APP_MYSQL_HOST: "mysql"
  APP_MYSQL_PORT: "3306"
  APP_MYSQL_USER: "mkc"
  APP_MYSQL_DBNAME: "mkc"
  APP_REDIS_ADDR: "redis:6379"
  APP_REDIS_DB: "0"
  APP_AI_SERVICE_BASE_URL: "http://ai-service:5000"
  APP_AI_SERVICE_TIMEOUT: "120s"
  APP_MINIO_ENDPOINT: "minio:9000"
  APP_MINIO_BUCKET: "mkc-resources"
  APP_MINIO_RESULTS_BUCKET: "mkc-resources"
  APP_MINIO_USE_SSL: "false"
  APP_OBSERVABILITY_METRICS_ENABLED: "true"
  APP_OBSERVABILITY_METRICS_PATH: "/metrics"
  APP_OBSERVABILITY_TRACING_ENABLED: "true"
  APP_OBSERVABILITY_TRACING_EXPORTER: "otlp"
  APP_OBSERVABILITY_TRACING_ENDPOINT: "http://jaeger:4318"
  APP_OBSERVABILITY_TRACING_SERVICE_NAME: "mkc-gateway"
