apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-service-config
data:
  APP_NAME: "mkc-ai-service"
  DEBUG: "false"
  ENV: "prod"
  PORT: "5000"
  LOG_LEVEL: "INFO"
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
  CELERY_BROKER_URL: "redis://:$(REDIS_PASSWORD)@redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://:$(REDIS_PASSWORD)@redis:6379/1"
  MINIO_BUCKET: "mkc-resources"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_USE_SSL: "false"
  VECTOR_STORE_PROVIDER: "milvus"
  VECTOR_STORE_URI: "http://milvus:19530"
  VECTOR_STORE_COLLECTION_NAME: "mkc_vectors"
  VECTOR_STORE_DIMENSIONS: "2048"
  VECTOR_STORE_FALLBACK_PROVIDER: "chroma"
  EMBEDDING_PROVIDER: "mock"
  EMBEDDING_MODEL: "embedding-3"
  EMBEDDING_DIMENSIONS: "2048"
  LLM_PROVIDER: "mock"
  LLM_MODEL: "glm-4-flash"
  GATEWAY_BASE_URL: "http://gateway:8080"
  TRACING_ENABLED: "true"
  TRACING_EXPORTER: "otlp"
  TRACING_ENDPOINT: "http://jaeger:4318"
  TRACING_SERVICE_NAME: "mkc-ai-service"
  METRICS_ENABLED: "true"
  METRICS_PATH: "/metrics"
