apiVersion: v1
kind: Service
metadata:
  name: ai-service
  labels:
    app: ai-service
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  labels:
    app: ai-service
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-service
          image: ghcr.io/coderzsq/mkc-ai-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ai-service-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/1"
            - name: CELERY_RESULT_BACKEND
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/1"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: INTERNAL_API_KEY
            - name: GATEWAY_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: INTERNAL_API_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_USER
            - name: ZHIPU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: ZHIPU_API_KEY
                  optional: true
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: KIMI_API_KEY
                  optional: true
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: LLM_API_KEY
                  optional: true
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: EMBEDDING_API_KEY
                  optional: true
          ports:
            - name: http
              containerPort: 5000
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
