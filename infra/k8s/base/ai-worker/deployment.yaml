apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  labels:
    app: ai-worker
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-worker
          image: ghcr.io/coderzsq/mkc-ai-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - celery_workers.celery_app
            - worker
            - -l
            - info
            - -Q
            - default,transcribe,parse_pdf,embed,rag
          envFrom:
            - configMapRef:
                name: ai-service-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/1"
            - name: CELERY_RESULT_BACKEND
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/1"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: INTERNAL_API_KEY
            - name: GATEWAY_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: INTERNAL_API_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: MINIO_ROOT_USER
            - name: ZHIPU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: ZHIPU_API_KEY
                  optional: true
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: KIMI_API_KEY
                  optional: true
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: LLM_API_KEY
                  optional: true
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mkc-secrets
                  key: EMBEDDING_API_KEY
                  optional: true
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          livenessProbe:
            exec:
              command: ["python", "-c", "import celery_workers.celery_app"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "import celery_workers.celery_app"]
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
