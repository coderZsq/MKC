<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">MKC Grafana dashboard overview</title>
  <desc id="desc">A sanitized dashboard-style image showing MKC monitoring panels.</desc>
  <style>
    .bg { fill: #111827; }
    .panel { fill: #1f2937; stroke: #374151; stroke-width: 2; rx: 8; }
    .grid { stroke: #374151; stroke-width: 1; opacity: .8; }
    .line1 { stroke: #38bdf8; stroke-width: 4; fill: none; }
    .line2 { stroke: #f97316; stroke-width: 4; fill: none; }
    .line3 { stroke: #22c55e; stroke-width: 4; fill: none; }
    .text { font-family: Arial, sans-serif; fill: #e5e7eb; font-size: 18px; }
    .small { font-family: Arial, sans-serif; fill: #9ca3af; font-size: 14px; }
    .title { font-family: Arial, sans-serif; fill: #ffffff; font-size: 28px; font-weight: 700; }
    .value { font-family: Arial, sans-serif; fill: #ffffff; font-size: 38px; font-weight: 700; }
  </style>
  <rect class="bg" width="1120" height="640"/>
  <text class="title" x="42" y="58">MKC observability overview</text>
  <text class="small" x="42" y="86">Sanitized visual based on checked-in Grafana dashboard definitions</text>

  <rect class="panel" x="42" y="120" width="320" height="190"/>
  <text class="text" x="66" y="154">QPS</text>
  <text class="value" x="66" y="220">12.4</text>
  <text class="small" x="66" y="250">gateway + ai-service requests/s</text>
  <path class="line1" d="M66 280 C120 250 170 286 220 255 C270 224 312 244 340 210"/>

  <rect class="panel" x="400" y="120" width="320" height="190"/>
  <text class="text" x="424" y="154">P95 / P99 latency</text>
  <path class="grid" d="M424 190 H690 M424 230 H690 M424 270 H690"/>
  <path class="line1" d="M424 270 C470 250 506 253 548 230 C590 205 632 215 692 180"/>
  <path class="line2" d="M424 286 C475 280 514 270 552 258 C610 236 652 246 692 218"/>
  <text class="small" x="424" y="292">gateway and ai-service histograms</text>

  <rect class="panel" x="758" y="120" width="320" height="190"/>
  <text class="text" x="782" y="154">5xx error rate</text>
  <text class="value" x="782" y="220">0.3%</text>
  <text class="small" x="782" y="250">low-cardinality labels only</text>
  <path class="line3" d="M782 280 C830 278 858 278 900 268 C948 256 988 280 1052 254"/>

  <rect class="panel" x="42" y="350" width="320" height="190"/>
  <text class="text" x="66" y="384">LLM requests</text>
  <path class="grid" d="M66 420 H332 M66 460 H332 M66 500 H332"/>
  <path class="line1" d="M66 508 C118 462 158 496 206 446 C250 400 292 430 334 390"/>
  <text class="small" x="66" y="522">provider, model, status</text>

  <rect class="panel" x="400" y="350" width="320" height="190"/>
  <text class="text" x="424" y="384">Retrieval requests</text>
  <path class="grid" d="M424 420 H690 M424 460 H690 M424 500 H690"/>
  <path class="line2" d="M424 500 C460 490 490 454 530 468 C584 486 618 436 692 414"/>
  <text class="small" x="424" y="522">operation and status labels</text>

  <rect class="panel" x="758" y="350" width="320" height="190"/>
  <text class="text" x="782" y="384">Task duration p95</text>
  <path class="grid" d="M782 420 H1048 M782 460 H1048 M782 500 H1048"/>
  <path class="line3" d="M782 496 C828 480 856 456 898 464 C948 474 988 430 1050 404"/>
  <text class="small" x="782" y="522">task_type and status</text>
</svg>
