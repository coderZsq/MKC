apiVersion: apps/v1
kind: Deployment
metadata:
  name: mkc-gateway
  labels:
    app: mkc-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mkc-gateway
  template:
    metadata:
      labels:
        app: mkc-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        fsGroup: 100
      containers:
        - name: gateway
          image: mkc-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mkc-gateway-config
                optional: true
          env:
            - name: CONFIG_PATH
              value: /app/config/config.yaml
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
