app:
  name: mkc-gateway
  version: 0.1.0
  env: dev

server:
  port: 8080
  mode: debug

log:
  level: info
  format: json

mysql:
  host: localhost
  port: 3306
  user: mkc
  password: ""
  dbname: mkc
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "change-me-in-prod"
  access_ttl: 15m
  refresh_ttl: 168h

ai_service:
  base_url: http://localhost:5000
  timeout: 60s
  internal_key: "change-me-in-prod"

task:
  max_retries: 3
  retry_delays:
    - 30s
    - 2m
    - 5m
  retry_cooldown: 5s
  dispatch_timeout: 30s
  auto_summary: true

conversation:
  default_title: 新会话
  max_context_messages: 20
  max_context_tokens: 4096

minio:
  endpoint: localhost:9000
  access_key: mkc
  secret_key: ""
  bucket: mkc-resources
  results_bucket: mkc-resources
  presigned_expiry: 1h
  use_ssl: false
  region: us-east-1
