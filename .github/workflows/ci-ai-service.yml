name: CI - AI Service

on:
  push:
    branches: [main, feature/**]
    paths:
      - 'ai-service/**'
      - '.github/workflows/ci-ai-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ai-service/**'
      - '.github/workflows/ci-ai-service.yml'

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-service
    env:
      INTERNAL_API_KEY: ci-test-internal-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            ./ai-service/requirements.txt
            ./ai-service/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check .

      - name: Type check with mypy
        run: mypy app

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-service-coverage
          path: ./ai-service/coverage.xml
          if-no-files-found: ignore
