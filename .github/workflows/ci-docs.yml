name: CI - Docs

on:
  push:
    branches: [main, feature/**]
    paths:
      - 'README.md'
      - 'docs/**/*.md'
      - 'docs/api/**'
      - '.markdownlint.json'
      - '.markdown-link-check.json'
      - '.github/workflows/ci-docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**/*.md'
      - 'docs/api/**'
      - '.markdownlint.json'
      - '.markdown-link-check.json'
      - '.github/workflows/ci-docs.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Markdown
        run: npx --yes markdownlint-cli README.md 'docs/**/*.md'

      - name: Check Markdown links
        run: |
          npx --yes markdown-link-check README.md --config .markdown-link-check.json
          find docs -name '*.md' -print0 | xargs -0 -n1 npx --yes markdown-link-check --config .markdown-link-check.json

  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validator
        run: pip install openapi-spec-validator

      - name: Validate OpenAPI
        run: python -m openapi_spec_validator docs/api/openapi.yaml

      - name: Check required endpoints
        run: |
          grep -q "  /auth/register:" docs/api/openapi.yaml
          grep -q "  /auth/login:" docs/api/openapi.yaml
          grep -q "  /auth/refresh:" docs/api/openapi.yaml
          grep -q "  /auth/logout:" docs/api/openapi.yaml
          grep -q "  /files/upload:" docs/api/openapi.yaml
          grep -q "  /tasks:" docs/api/openapi.yaml
          grep -q "  /tasks/{task_id}:" docs/api/openapi.yaml
          grep -q "  /tasks/{task_id}/progress:" docs/api/openapi.yaml
