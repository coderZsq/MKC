name: CI - Client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/ci-client.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/ci-client.yml'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
