name: CI - Gateway

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/ci-gateway.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/ci-gateway.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
